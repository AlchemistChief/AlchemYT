<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlchemYT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="topbar">
        <span>
            <span class="username">AlchemistChief</span><span class="dot">.</span><span class="whitetext">github.io</span>
            <span class="dot">/</span>
            <span class="websitename">AlchemYT</span>
        </span>
    </div>
    
    <h1>YouTube Video Downloader</h1>
    
    <div class="container">
        <input type="text" id="url" placeholder="Enter YouTube URL">
        <button id="fetchInfoBtn">Fetch Video</button>
        <div id="error" style="color: red;"></div>
    </div>
    
    <div id="videoContainer">
        <div id="videoInfo">
            <h2>Video Info</h2>
            <h3 id="title"></h3>
            <iframe id="videoEmbed" width="560" height="315" frameborder="0" allowfullscreen></iframe>
            <p id="duration"></p>
            <p id="description"></p>
        </div>
        <button id="downloadMp3Btn">Download MP3</button>
        <button id="downloadMp4Btn">Download MP4</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
