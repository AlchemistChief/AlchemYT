<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlchemYT - YouTube Video Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topbar">
        <span class="websitename"><span class="name">AlchemYT</span><span class="dot">.</span><span class="github">github</span><span class="io">.io</span></span>
    </div>
    
    <h1>YouTube Video Downloader</h1>
    
    <div class="container">
        <input type="text" id="url" placeholder="Enter YouTube URL">
        <button id="fetchInfoBtn">Get Info</button>
        <button id="downloadMp3Btn">Download MP3</button>
        <button id="downloadMp4Btn">Download MP4</button>


        <div id="error" style="color: red;"></div>
        
        <!-- Video Container (Initially hidden with 0px height) -->
        <div id="videoContainer">
            <div id="videoInfo">
                <h2>Video Info</h2>
                <p id="title"></p>
                <img id="thumbnail" alt="Video Thumbnail" />
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
