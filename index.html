<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>YouTube Video Downloader</h1>
        <div class="input-section">
            <input type="text" id="videoUrl" placeholder="Enter YouTube video URL" />
            <button onclick="fetchVideoInfo()">Download Video</button>
        </div>
        
        <div class="result">
            <h2 id="videoTitle"></h2>
            
            <!-- Links for downloading MP3 and MP4 -->
            <div id="downloadLinks" style="display: none;">
                <a id="mp3DownloadLink" href="#" download>Download MP3</a><br>
                <a id="mp4DownloadLink" href="#" download>Download MP4</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
