<!--index.html - Never remove-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlchemYT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="topbar">
        <span>
            <span class="username">AlchemistChief</span><span class="dot">.</span><span class="whitetext">github.io</span>
            <span class="dot">/</span>
            <span class="websitename">AlchemYT</span>
        </span>
        <a href="/Sub/Terms.html">
            <button class="terms-button">Terms of Service</button>
        </a>
    </div>
    
    
    <h1>YouTube Video Downloader</h1>
    
    <div class="container">
        <input type="text" id="url" placeholder="Enter YouTube URL">
        <button id="fetchInfoBtn">Fetch Video</button>
        <div id="error"></div>
    </div>
    
    <div id="videoContainer">
        <div id="videoInfo">
            <h2 class="info-title">Video Info</h2>
            <h3 class="info-subtitle"><span class="info-label">Title:</span> <span id="title"></span></h3>
            <h3 class="info-subtitle"><span class="info-label">Duration:</span> <span id="duration"></span></h3>
            <iframe id="videoEmbed" width="560" height="315" frameborder="0" allowfullscreen></iframe>
        </div>
        <table id="downloadOptions">
            <thead>
                <tr>
                    <th>Format</th>
                    <th>Options</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>MP3</td>
                    <td>
                        <button class="mp3" id="downloadMp3Btn">Download MP3</button>
                    </td>
                </tr>
                <tr>
                    <td>MP4</td>
                    <td>
                        <button class="mp4" id="downloadMp4_144pBtn">144p</button>
                        <button class="mp4" id="downloadMp4_240pBtn">240p</button>
                        <button class="mp4" id="downloadMp4_360pBtn">360p</button>
                        <button class="mp4" id="downloadMp4_480pBtn">480p</button>
                        <button class="mp4" id="downloadMp4_720pBtn">720p</button>
                        <button class="mp4" id="downloadMp4_1080pBtn">1080p</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    

    <!-- MP3 and MP4 tables to display download links -->
    <div id="mp3TableContainer">
        <h2>MP3 Downloads</h2>
        <table id="mp3Table">
            <thead>
                <tr>
                    <th>Video Title</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody>
                <!-- MP3 rows will be inserted here -->
            </tbody>
        </table>
    </div>
    
    <div id="mp4TableContainer">
        <h2>MP4 Downloads</h2>
        <table id="mp4Table">
            <thead>
                <tr>
                    <th>Video Title</th>
                    <th>Download</th>
                </tr>
            </thead>
            <tbody>
                <!-- MP4 rows will be inserted here -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
